{% extends "base.html" %} {% block title %}Fishtank Viewer{% endblock %} {%
block head %}
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="/static/viewer.js" defer></script>
{% endblock %} {% block body %}
<div id="app">
  <div id="viewer-layout">
    <!-- Main video area -->
    <div id="video-panel">
      <div id="video-container">
        <video id="video" playsinline></video>
        <svg
          id="zone-overlay"
          viewBox="0 0 1 1"
          preserveAspectRatio="none"
        ></svg>
        <div id="stream-label"></div>
      </div>
      <div id="volume-controls">
        <button id="mute-btn" type="button" title="Mute/Unmute">
          &#x1F50A;
        </button>
        <input
          id="volume-slider"
          type="range"
          min="0"
          max="1"
          step="0.01"
          value="1"
        />
        <div id="quality-controls">
          <button class="quality-btn" data-quality="low" type="button">
            Low
          </button>
          <button class="quality-btn" data-quality="medium" type="button">
            Med
          </button>
          <button class="quality-btn" data-quality="high" type="button">
            High
          </button>
        </div>
        <div id="clip-controls">
          <button
            id="clip-record-btn"
            type="button"
            title="Start/Stop clip buffer"
            class="clip-btn"
          >
            &#x23FA;
          </button>
          <span id="clip-buffer-indicator" class="clip-indicator"></span>
          <button
            id="clip-trim-btn"
            type="button"
            title="Trim & save clip"
            class="clip-btn"
            disabled
          >
            &#x2702;
          </button>
          <select id="clip-duration-select" title="Buffer length">
            <option value="30">30s</option>
            <option value="60">60s</option>
            <option value="120" selected>120s</option>
            <option value="300">5m</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Picture-in-Picture pinned view -->
    <div id="pip-container" class="pip-hidden">
      <video id="pip-video" playsinline muted></video>
      <div id="pip-label"></div>
      <button id="pip-mute" type="button" title="Mute/Unmute PiP">
        &#x1F507;
      </button>
      <button id="pip-close" type="button" title="Close PiP">&times;</button>
      <div id="pip-quality-controls">
        <button class="quality-btn" data-quality="low" type="button">L</button>
        <button class="quality-btn" data-quality="medium" type="button">
          M
        </button>
        <button class="quality-btn" data-quality="high" type="button">H</button>
      </div>
      <div id="pip-clip-controls">
        <button
          id="pip-clip-record-btn"
          type="button"
          title="Start/Stop PiP clip buffer"
          class="clip-btn clip-btn-small"
        >
          &#x23FA;
        </button>
        <span
          id="pip-clip-buffer-indicator"
          class="clip-indicator clip-indicator-small"
        ></span>
        <button
          id="pip-clip-trim-btn"
          type="button"
          title="Trim & save PiP clip"
          class="clip-btn clip-btn-small"
          disabled
        >
          &#x2702;
        </button>
      </div>
      <div id="pip-resize-handle"></div>
    </div>

    <!-- Camera grid sidebar -->
    <div id="grid-panel">
      <div id="camera-grid"></div>
    </div>
  </div>
</div>

<!-- Trim modal -->
<div id="trim-modal" class="trim-modal-hidden">
  <div id="trim-modal-backdrop"></div>
  <div id="trim-modal-content">
    <div id="trim-header">
      <h3>Trim Clip</h3>
      <button id="trim-cancel-btn" type="button" title="Cancel">&times;</button>
    </div>
    <div id="trim-previews">
      <div class="trim-preview-box">
        <span class="trim-preview-label">Start</span>
        <img id="trim-start-thumb" alt="Start frame" />
        <span id="trim-start-time" class="trim-time-label">00:00</span>
      </div>
      <div class="trim-preview-box">
        <span class="trim-preview-label">End</span>
        <img id="trim-end-thumb" alt="End frame" />
        <span id="trim-end-time" class="trim-time-label">00:00</span>
      </div>
    </div>
    <div id="trim-timeline">
      <div id="trim-track">
        <div id="trim-selection"></div>
        <div
          id="trim-handle-start"
          class="trim-handle"
          data-handle="start"
        ></div>
        <div id="trim-handle-end" class="trim-handle" data-handle="end"></div>
      </div>
    </div>
    <div id="trim-info">
      <span id="trim-duration-label">Duration: 0s</span>
    </div>
    <div id="trim-actions">
      <button id="trim-save-btn" type="button" class="trim-action-btn">
        Save Clip
      </button>
    </div>
    <div id="trim-progress" class="trim-progress-hidden">
      <span>Exporting&hellip;</span>
    </div>
  </div>
</div>
{% endblock %}
